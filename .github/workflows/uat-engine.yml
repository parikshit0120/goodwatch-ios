name: UAT Engine

on:
  schedule:
    - cron: '30 22 * * *'  # 4:00 AM IST (22:30 UTC)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print scenarios, do not publish)'
        required: false
        default: 'false'
        type: boolean
  push:
    paths:
      - 'GoodWatch/App/Core/GWRecommendationEngine.swift'
      - 'GoodWatch/App/Core/GWSpec.swift'
      - '.github/scripts/uat_engine.py'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

jobs:
  uat:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run UAT Engine
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python .github/scripts/uat_engine.py --dry-run
          else
            python .github/scripts/uat_engine.py
          fi

      - name: Notify on error
        if: failure()
        run: echo "::error::UAT Engine failed to complete. Check logs for details."
