name: GoodWatch
options:
  bundleIdPrefix: com.parikshit.goodwatch
  deploymentTarget:
    iOS: "17.0"

packages:
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  GoogleSignIn-iOS:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.0.0"
  posthog-ios:
    url: https://github.com/PostHog/posthog-ios
    from: "3.0.0"
  purchases-ios:
    url: https://github.com/RevenueCat/purchases-ios
    from: "4.0.0"
  OneSignal-XCFramework:
    url: https://github.com/OneSignal/OneSignal-XCFramework
    from: "5.0.0"

targets:
  GoodWatch:
    type: application
    platform: iOS
    sources:
      - GoodWatch
    dependencies:
      - package: firebase-ios-sdk
        product: FirebaseAnalytics
      - package: firebase-ios-sdk
        product: FirebaseMessaging
      - package: firebase-ios-sdk
        product: FirebaseCrashlytics
      - package: firebase-ios-sdk
        product: FirebaseRemoteConfig
      - package: GoogleSignIn-iOS
        product: GoogleSignIn
      - package: posthog-ios
        product: PostHog
      - package: purchases-ios
        product: RevenueCat
      - package: purchases-ios
        product: RevenueCatUI
      - package: OneSignal-XCFramework
        product: OneSignalFramework
    entitlements:
      path: GoodWatch/GoodWatch.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        aps-environment: development
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: PJWorks.goodwatch.movies.v1
        MARKETING_VERSION: 1.3.1
        CURRENT_PROJECT_VERSION: 3
        DEVELOPMENT_TEAM: H827NY6Y9W
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: Apple Development
        CODE_SIGN_ENTITLEMENTS: GoodWatch/GoodWatch.entitlements
        TARGETED_DEVICE_FAMILY: "1"
    info:
      path: GoodWatch/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIRequiresFullScreen: true
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes:
          - remote-notification
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - com.googleusercontent.apps.1064227633048-375dsiqq8vlt0o2l34lfr66q224fivg4
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - goodwatch
        GIDClientID: 1064227633048-375dsiqq8vlt0o2l34lfr66q224fivg4.apps.googleusercontent.com
        LSApplicationQueriesSchemes:
          - youtube
          - nflx
          - aiv
          - com.amazon.aiv.play
          - hotstar
    postBuildScripts:
      - name: "Upload Crashlytics dSYMs"
        script: |
          "${BUILD_DIR%/Build/*}/SourcePackages/checkouts/firebase-ios-sdk/Crashlytics/run"
        inputFiles:
          - "${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}"
          - "${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}/Contents/Resources/DWARF/${PRODUCT_NAME}"
          - "${DWARF_DSYM_FOLDER_PATH}/${DWARF_DSYM_FILE_NAME}/Contents/Info.plist"
          - "$(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/GoogleService-Info.plist"
          - "$(TARGET_BUILD_DIR)/$(EXECUTABLE_PATH)"
    scheme:
      testTargets:
        - GoodWatchTests
        - GoodWatchUITests
      gatherCoverageData: false
  GoodWatchTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - GoodWatchTests
    dependencies:
      - target: GoodWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.parikshit.goodwatch.tests
        DEVELOPMENT_TEAM: H827NY6Y9W
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: "YES"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/GoodWatch.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/GoodWatch"
        BUNDLE_LOADER: "$(TEST_HOST)"
  GoodWatchUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - GoodWatchUITests
    dependencies:
      - target: GoodWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.parikshit.goodwatch.uitests
        DEVELOPMENT_TEAM: H827NY6Y9W
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: "YES"
