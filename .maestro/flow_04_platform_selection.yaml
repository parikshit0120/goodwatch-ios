appId: PJWorks.goodwatch.movies.v1
name: "Flow 04 - Platform Selection"
---
- launchApp:
    appId: PJWorks.goodwatch.movies.v1
    clearState: true
    arguments:
      --interaction-points: "1000"
      --skip-loading-delay: ""
      --reset-onboarding: ""
- waitForAnimationToEnd
- tapOn:
    id: "landing_pick_for_me"
- waitForAnimationToEnd
- tapOn:
    id: "auth_skip"
- waitForAnimationToEnd
- tapOn:
    id: "mood_card_0"
- waitForAnimationToEnd
- tapOn:
    id: "mood_continue"
- waitForAnimationToEnd
- assertVisible:
    id: "platform_netflix"
    optional: true
- takeScreenshot: flow_04_platform_screen
- tapOn:
    id: "platform_netflix"
    optional: true
- waitForAnimationToEnd
- assertVisible:
    id: "platform_continue"
- tapOn:
    id: "platform_continue"
- waitForAnimationToEnd
- takeScreenshot: flow_04_after_platform
